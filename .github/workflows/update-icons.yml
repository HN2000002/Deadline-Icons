name: Update Notion deadline icons

on:
  workflow_dispatch:

  schedule:
    # Runs at 15 minutes past every hour.
    - cron: "15 * * * *"

permissions:
  contents: read

jobs:
  update-icons:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Update Notion page icons
        run: python update_deadline_icons.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

          NOTION_DATA_SOURCE_ID: "39ecd388-8383-8019-bbf8-000b7ff88754"

          DUE_DATE_PROPERTY: "Due Date"
          STATUS_PROPERTY: "Status"
          DONE_STATUSES: "Done"

          TIMEZONE: "Europe/London"

          # 🔴 Overdue or due within 2 days.
          RED_DAYS: "2"

          # 🟠 Due within 3–7 days.
          ORANGE_DAYS: "7"

          DRY_RUN: "false"
